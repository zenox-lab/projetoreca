<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno - ONG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <i class="fas fa-graduation-cap fa-3x text-primary"></i>
                <h3 class="mt-2">Área do Responsável</h3>
                <p class="text-muted">Consulte frequência e notas sem senha.</p>
            </div>

            <form id="formPais">
                <div class="mb-3">
                    <label for="rg" class="form-label">RG do Aluno</label>
                    <input type="text" class="form-control" id="rg" placeholder="Ex: 12.345.678-9" required>
                </div>
                <div class="mb-3">
                    <label for="nascimento" class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control" id="nascimento" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Consultar Dados</button>
            </form>

            <div id="resultado" class="mt-4 d-none border-top pt-3">
                <h5 class="text-success"><i class="fas fa-user-check"></i> Emily Vitória</h5>
                <div class="card bg-light mb-2">
                    <div class="card-body p-2">
                        <strong>Oficina de Violão</strong><br>
                        <small>Frequência: <span class="badge bg-success">95%</span></small><br>
                        <small>Última Nota: 9.0</small>
                    </div>
                </div>
                <div class="card bg-light">
                    <div class="card-body p-2">
                        <strong>Informática</strong><br>
                        <small>Frequência: <span class="badge bg-warning">70%</span></small><br>
                        <small>Última Nota: Pendente</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simples script para mostrar o resultado ao clicar (apenas visual)
        document.getElementById('formPais').addEventListener('submit', function(e){
            e.preventDefault();
            document.getElementById('resultado').classList.remove('d-none');
        });
    </script>
</body>
</html>
